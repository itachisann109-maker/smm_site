{% extends "base.html" %}

{% block content %}
<div class="container">
    <div class="text-center py-5">
        <i class="fas fa-file-excel" style="font-size: 4rem; color: #28a745; margin-bottom: 20px;"></i>
        <h2 style="color: var(--text-primary); font-weight: 700;">Экспорт заказов</h2>
        <p class="text-muted">Выберите формат экспорта</p>
        
        <div class="row justify-content-center mt-4">
            <div class="col-md-4">
                <a href="{{ url_for('export_orders_csv') }}" class="btn btn-success w-100 py-3">
                    <i class="fas fa-file-csv me-2"></i>CSV
                </a>
                <p class="text-muted small mt-2">Для Excel, Google Sheets</p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
