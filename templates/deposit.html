{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="text-center mb-4">
            <h2 style="color: var(--text-primary); font-weight: 700;">Пополнение баланса</h2>
            <p class="text-muted">Выберите сумму и способ оплаты</p>
        </div>

        <div class="card p-4" style="background: var(--bg-card); border: 1px solid var(--border-light); border-radius: 16px;">
            <div class="text-center mb-4">
                <span class="text-muted">Текущий баланс</span>
                <h3 style="color: var(--text-primary); font-weight: 700;">{{ user.balance }} ₽</h3>
            </div>

            <div class="mb-4">
                <label class="form-label fw-semibold" style="color: var(--text-primary);">Сумма пополнения</label>
                <p class="text-muted small">Минимальная сумма — <strong>500 ₽</strong></p>
                <div class="d-flex flex-wrap gap-2 mb-3">
                    <button type="button" class="btn btn-outline-secondary amount-btn" data-amount="500">500 ₽</button>
                    <button type="button" class="btn btn-outline-secondary amount-btn" data-amount="1000">1 000 ₽</button>
                    <button type="button" class="btn btn-outline-secondary amount-btn" data-amount="3000">3 000 ₽</button>
                    <button type="button" class="btn btn-outline-secondary amount-btn" data-amount="5000">5 000 ₽</button>
                    <button type="button" class="btn btn-outline-secondary amount-btn" data-amount="10000">10 000 ₽</button>
                </div>
                <div class="input-group">
                    <span class="input-group-text" style="background: var(--bg-code); border: 1px solid var(--border-light); border-right: none; color: var(--text-secondary); border-radius: 8px 0 0 8px;">₽</span>
                    <input type="number" class="form-control" id="amountInput" min="500" step="1" placeholder="Введите сумму (от 500 ₽)" style="background: var(--bg-input); border: 1px solid var(--border-light); border-left: none; color: var(--text-primary); border-radius: 0 8px 8px 0;">
                </div>
                <div id="amountWarning" class="text-danger small mt-1" style="display: none;">❌ Минимальная сумма — 500 ₽</div>
            </div>

            <div class="mb-4">
                <label class="form-label fw-semibold" style="color: var(--text-primary);">Способы оплаты</label>
                <div class="payment-methods">
                    <!-- Platega -->
                    <div class="payment-option">
                        <input type="radio" name="payment_method" value="platega" id="platega" checked>
                        <label for="platega" class="payment-label">
                            <i class="fas fa-credit-card me-2"></i>
                            <span>Банковская карта (Platega)</span>
                        </label>
                    </div>
                    <div class="payment-option">
                        <input type="radio" name="payment_method" value="sbp" id="sbp">
                        <label for="sbp" class="payment-label">
                            <i class="fas fa-qrcode me-2"></i>
                            <span>СБП (любой банк РФ)</span>
                        </label>
                    </div>
                </div>
            </div>

            <!-- Кнопка оплаты через Platega -->
            <form method="POST" action="{{ url_for('payment_platega') }}" id="plategaForm">
                <input type="hidden" name="amount" id="plategaAmount" value="">
                <button type="submit" class="btn btn-success w-100" id="depositBtn" style="font-weight: 600; padding: 12px; background: var(--btn-dark-bg); color: var(--btn-dark-text); border: none; border-radius: 10px;">
                    <i class="fas fa-check-circle me-2"></i>Оплатить через Platega
                </button>
            </form>

            <!-- Кнопка оплаты через СБП (демо) -->
            <form method="POST" action="{{ url_for('deposit') }}" id="sbpForm" style="display: none;">
                <input type="hidden" name="amount" id="sbpAmount" value="">
                <button type="submit" class="btn btn-success w-100" id="sbpBtn" style="font-weight: 600; padding: 12px; background: var(--btn-dark-bg); color: var(--btn-dark-text); border: none; border-radius: 10px;">
                    <i class="fas fa-check-circle me-2"></i>Пополнить (СБП — демо)
                </button>
            </form>

            <p class="text-center text-muted mt-3 small">🔒 Безопасная оплата через Platega</p>
        </div>

        <div class="text-center mt-3">
            <a href="{{ url_for('index') }}" class="btn btn-outline-secondary" style="border-radius: 10px;">На главную</a>
        </div>
    </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', function() {
    const amountBtns = document.querySelectorAll('.amount-btn');
    const amountInput = document.getElementById('amountInput');
    const amountWarning = document.getElementById('amountWarning');
    const plategaForm = document.getElementById('plategaForm');
    const sbpForm = document.getElementById('sbpForm');
    const plategaAmount = document.getElementById('plategaAmount');
    const sbpAmount = document.getElementById('sbpAmount');
    const depositBtn = document.getElementById('depositBtn');
    const sbpBtn = document.getElementById('sbpBtn');
    const paymentMethods = document.querySelectorAll('input[name="payment_method"]');

    // Кнопки-суммы
    amountBtns.forEach(function(btn) {
        btn.addEventListener('click', function() {
            amountBtns.forEach(function(b) { b.classList.remove('active'); });
            this.classList.add('active');
            amountInput.value = this.dataset.amount;
            amountWarning.style.display = 'none';
        });
    });

    // Проверка при вводе
    amountInput.addEventListener('input', function() {
        amountBtns.forEach(function(b) { b.classList.remove('active'); });
        const val = parseFloat(this.value);
        if (val < 500 && val > 0) {
            amountWarning.style.display = 'block';
        } else {
            amountWarning.style.display = 'none';
        }
    });

    // Переключение между способами оплаты
    paymentMethods.forEach(function(method) {
        method.addEventListener('change', function() {
            if (this.value === 'platega') {
                plategaForm.style.display = 'block';
                sbpForm.style.display = 'none';
            } else {
                plategaForm.style.display = 'none';
                sbpForm.style.display = 'block';
            }
        });
    });

    // Отправка через Platega
    plategaForm.addEventListener('submit', function(e) {
        const amount = parseFloat(amountInput.value);
        
        if (!amount || amount <= 0) {
            e.preventDefault();
            alert('❌ Пожалуйста, введите сумму пополнения');
            amountInput.focus();
            return false;
        }
        
        if (amount < 500) {
            e.preventDefault();
            alert('❌ Минимальная сумма пополнения — 500 ₽');
            amountInput.focus();
            return false;
        }

        plategaAmount.value = amount;
    });

    // Отправка через СБП (демо)
    sbpForm.addEventListener('submit', function(e) {
        const amount = parseFloat(amountInput.value);
        
        if (!amount || amount <= 0) {
            e.preventDefault();
            alert('❌ Пожалуйста, введите сумму пополнения');
            amountInput.focus();
            return false;
        }
        
        if (amount < 500) {
            e.preventDefault();
            alert('❌ Минимальная сумма пополнения — 500 ₽');
            amountInput.focus();
            return false;
        }

        sbpAmount.value = amount;
    });

    // Enter в поле суммы
    amountInput.addEventListener('keypress', function(e) {
        if (e.key === 'Enter') {
            const selectedMethod = document.querySelector('input[name="payment_method"]:checked');
            if (selectedMethod && selectedMethod.value === 'platega') {
                plategaForm.dispatchEvent(new Event('submit'));
            } else {
                sbpForm.dispatchEvent(new Event('submit'));
            }
        }
    });
});
</script>
{% endblock %}
